trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: devops-portfolio
  dockerRegistryServiceConnection: ACR-Connection
  azureSubscription: ARM Service Connection
  aksResourceGroup: rg-devops-portfolio
  aksClusterName: DevOps-AKS
  namespace: default
  deploymentName: portfolio-deployment
  containerName: portfolio
  tag: $(Build.BuildId)

stages:
- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: Build
    displayName: Build Docker Image

    steps:

    - task: Docker@2
      displayName: Build and Push Image

      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: Dockerfile
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to AKS

  dependsOn: Build

  jobs:

  - deployment: DeployToAKS
    displayName: Deploy Application
    environment: Production
    strategy:
      runOnce:

        deploy:
          steps:
          - task: KubernetesManifest@1

            displayName: Deploy to AKS

            inputs:

              action: deploy

              connectionType: azureResourceManager

              azureSubscriptionConnection: $(azureSubscription)

              azureResourceGroup: $(aksResourceGroup)

              kubernetesCluster: $(aksClusterName)

              namespace: $(namespace)

              manifests: |
                k8s/deployment.yaml
                k8s/service.yaml

              containers: |
                $(imageRepository):$(tag)